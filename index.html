<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票策略历史回测系统</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/echarts.min.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1 class="header-title">
        <span class="header-icon">📈</span>股票策略历史回测系统
      </h1>
      <p class="header-subtitle">
        基于技术指标的买卖策略回测 · 数据来源: 东方财富 & Yahoo Finance
      </p>
    </div>
  </header>

  <main class="container">
    <!-- Input Section -->
    <section class="input-section card">
      <div class="input-row">
        <div class="input-group">
          <label for="stockInput" class="input-label">📊 股票代码</label>
          <input
            type="text"
            id="stockInput"
            class="stock-input"
            placeholder="输入代码，如 600519 / AAPL"
            autocomplete="off"
          />
          <div id="autocompleteDropdown" class="autocomplete-dropdown hidden"></div>
        </div>
        <button id="queryBtn" class="btn btn-primary">
          <span class="btn-icon">🔍</span> 查询回测
        </button>
      </div>
    </section>

    <!-- Period Selector -->
    <section class="period-section card">
      <span class="section-label">⏱ 回测周期</span>
      <div class="period-group" id="periodGroup">
        <button class="period-btn" data-period="5y">5 年</button>
        <button class="period-btn" data-period="3y">3 年</button>
        <button class="period-btn active" data-period="1y">1 年</button>
        <button class="period-btn" data-period="6m">6 月</button>
        <button class="period-btn" data-period="3m">3 月</button>
        <button class="period-btn" data-period="1m">1 月</button>
      </div>
    </section>

    <!-- Strategy Selector -->
    <section class="strategy-section card">
      <span class="section-label">📈 策略选择 <small>（点击选择，选中高亮）</small></span>
      <div class="strategy-grid" id="strategyGrid">
        <!-- Filled dynamically by JS -->
      </div>
      <div id="strategyExplanation" class="strategy-explanation hidden">
        <strong>📖 策略说明：</strong><span id="strategyDescText"></span>
      </div>
    </section>

    <!-- Main Content -->
    <section class="main-content">
      <!-- Chart -->
      <div class="chart-panel card">
        <div class="chart-header">
          <button id="bollingerBtn">BOLL(55,2)</button>
          <h3 class="chart-title" id="chartTitle">股价走势图</h3>
          <div class="chart-toggle">
            <button class="chart-type-btn active" data-chart-type="candlestick">K线图</button>
            <button class="chart-type-btn" data-chart-type="line">折线图</button>
          </div>
        </div>
        <div class="chart-wrapper">
          <div id="chartContainer" class="chart-container"></div>
          <div id="chartPlaceholder" class="chart-placeholder">
            <div class="placeholder-icon">📊</div>
            <p class="placeholder-text">输入股票代码并选择策略后点击查询</p>
            <p class="placeholder-hint">支持 A 股（沪深）和美股，个股及 ETF</p>
          </div>
          <div id="chartLoading" class="chart-loading hidden">
          <div class="spinner"></div>
          <p>正在获取数据并计算回测...</p>
        </div>
        </div>
      </div>

      <!-- Metrics Panel -->
      <aside class="metrics-panel card" id="metricsPanel">
        <h3 class="metrics-title">📊 收益指标</h3>
        <div class="metrics-grid">
          <div class="metric-item">
            <span class="metric-label">总收益率</span>
            <span class="metric-value" id="metricTotalReturn">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">年化收益</span>
            <span class="metric-value" id="metricAnnualReturn">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">胜率</span>
            <span class="metric-value" id="metricWinRate">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">最大回撤</span>
            <span class="metric-value negative" id="metricMaxDrawdown">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">夏普比率</span>
            <span class="metric-value" id="metricSharpe">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">交易次数</span>
            <span class="metric-value" id="metricTrades">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">平均持仓</span>
            <span class="metric-value" id="metricAvgHold">--</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">基准收益</span>
            <span class="metric-value" id="metricBenchmark">--</span>
          </div>
        </div>
      </aside>
    </section>

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner hidden">
      <span class="error-icon">⚠️</span>
      <span id="errorMessage"></span>
      <button class="error-close" id="errorClose">✕</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>⚠️ 免责声明：本工具仅供学习研究使用，不构成任何投资建议。股市有风险，投资需谨慎。</p>
  </footer>

  <!-- Pre-loaded stock data (instant, no fetch needed) -->
  <script src="data/600519.js"></script>
  <script src="data/688521.js"></script>
  <script>console.log('[OK] data loaded: ' + (window.__STOCK_DATA__ ? Object.keys(window.__STOCK_DATA__).join(',') : 'FAIL'));</script>

  <!-- Scripts -->
  <script src="js/constants.js"></script>
  <script src="js/api.js"></script>
  <script src="js/strategy.js"></script>
  <script src="js/metrics.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <!-- Debug logging -->
  <script>
    console.log('[load] all scripts done');
    console.log('[load] __STOCK_DATA__: ' + (window.__STOCK_DATA__ ? 'OK' : 'MISSING'));
    console.log('[load] echarts: ' + (typeof echarts !== 'undefined' ? 'OK' : 'MISSING'));
    console.log('[load] App: ' + (typeof App !== 'undefined' ? 'OK' : 'MISSING'));
    window.addEventListener('error', function(e) {
      console.error('GLOBAL ERROR:', e.message, e.filename, e.lineno, e.colno);
      var b = document.getElementById('errorBanner');
      var m = document.getElementById('errorMessage');
      if (b && m) { m.textContent = 'JS Error: ' + e.message + ' @' + e.filename + ':' + e.lineno; b.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
